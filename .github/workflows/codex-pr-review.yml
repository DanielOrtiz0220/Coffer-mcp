name: Codex PR review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: codex-pr-review-auth-${{ github.repository }}
  cancel-in-progress: false

jobs:
  codex:
    name: Review PR
    if: >-
      ${{
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.draft == false &&
        github.actor == 'DanielOrtiz0220'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Fetch review refs
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr-${{ github.event.pull_request.number }}"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Codex
        shell: bash
        run: npm install -g @openai/codex@latest

      - name: Prepare Codex auth
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${CODEX_AUTH_JSON_B64:-}" ]; then
            echo "CODEX_AUTH_JSON_B64 secret is not configured." >&2
            exit 1
          fi

          install -d -m 700 "${CODEX_HOME}"
          printf '%s' "${CODEX_AUTH_JSON_B64}" | base64 --decode > "${CODEX_HOME}/auth.json"
          chmod 600 "${CODEX_HOME}/auth.json"

          printf '%s\n' 'cli_auth_credentials_store = "file"' > "${CODEX_HOME}/config.toml"

      - name: Validate Codex auth
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          set -euo pipefail
          jq -e '
            .auth_mode == "chatgpt" and
            (((.tokens.refresh_token? // .refresh_token? // .refreshToken? // "") | strings | length) > 0)
          ' "${CODEX_HOME}/auth.json" > /dev/null

      - name: Run Codex review
        id: codex
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          CODEX_PR_BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          CODEX_PR_HEAD_REF: origin/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          final_message_file="$(mktemp)"

          codex exec \
            --cd "$GITHUB_WORKSPACE" \
            --model gpt-5.5 \
            --sandbox read-only \
            --output-last-message "$final_message_file" \
            -c 'model_reasoning_effort="xhigh"' \
            - < .github/codex/prompts/pr-review.md

          delimiter="codex_final_$(uuidgen)"
          while grep -Fqx "$delimiter" "$final_message_file"; do
            delimiter="codex_final_$(uuidgen)"
          done

          {
            echo "final-message<<${delimiter}"
            cat "$final_message_file"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Persist refreshed Codex auth
        if: always()
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
          CODEX_SECRET_UPDATE_TOKEN: ${{ secrets.CODEX_SECRET_UPDATE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -f "${CODEX_HOME}/auth.json" ]; then
            if [ -z "${CODEX_SECRET_UPDATE_TOKEN:-}" ]; then
              echo "CODEX_SECRET_UPDATE_TOKEN secret is not configured." >&2
              exit 1
            fi

            base64 -w 0 "${CODEX_HOME}/auth.json" |
              GH_TOKEN="${CODEX_SECRET_UPDATE_TOKEN}" gh secret set CODEX_AUTH_JSON_B64 \
                --repo "$GITHUB_REPOSITORY"
          fi

      - name: Remove Codex auth
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/codex-home/auth.json"

  comment:
    name: Post sticky comment
    needs:
      - codex
    if: ${{ needs.codex.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Upsert Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          script: |
            const marker = '<!-- codex-pr-review -->';
            const finalMessage = (process.env.CODEX_FINAL_MESSAGE || '').trim();

            if (!finalMessage) {
              core.info('Codex did not return a final message; skipping comment.');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const body = `${marker}\n${finalMessage}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
